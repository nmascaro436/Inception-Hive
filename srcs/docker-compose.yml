services:
  mariadb:
    build: requirements/mariadb
    image: mariadb
    container_name: mariadb
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    networks:
      - inception_net
    restart: unless-stopped

  wordpress:
    build: requirements/wordpress
    image: wordpress
    container_name: wordpress
    volumes:
      - wp_data:/var/www/html
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    networks:
      - inception_net
    restart: unless-stopped
    depends_on:
      - mariadb

  nginx:
    build: requirements/nginx
    image: nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception_net
    restart: unless-stopped
    depends_on:
      - wordpress

volumes:
  db_data:
    name: db_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/nmascaro/data/db
  wp_data:
    name: wp_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/nmascaro/data/wp

networks:
  inception_net:
    name: inception_net
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
